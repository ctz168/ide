<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>PhoneIDE</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- CodeMirror 5 CSS (bundled locally) -->
    <link rel="stylesheet" href="/vendor/codemirror/codemirror.min.css">
    <link rel="stylesheet" href="/vendor/codemirror/theme/dracula.min.css">
    <link rel="stylesheet" href="/vendor/codemirror/addon/hint/show-hint.min.css">
    <link rel="stylesheet" href="/vendor/codemirror/addon/dialog/dialog.min.css">
    <link rel="stylesheet" href="/vendor/codemirror/addon/fold/foldgutter.min.css">
</head>
<body>
    <!-- Top Toolbar -->
    <header id="toolbar">
        <button id="btn-menu" title="文件">☰</button>
        <span id="file-name">未打开文件</span>
        <div id="toolbar-actions">
            <button id="btn-undo" title="撤销">↩</button>
            <button id="btn-redo" title="重做">↪</button>
            <button id="btn-run" title="运行">▶</button>
            <button id="btn-stop" title="停止" style="display:none">⏹</button>
            <button id="btn-check-updates" title="检查更新">⬆</button>
            <button id="btn-chat" title="AI助手">🤖</button>
        </div>
    </header>

    <!-- Left Sidebar -->
    <div id="sidebar-left" class="sidebar left">
        <div id="sidebar-left-header">
            <h3><span id="app-title">PhoneIDE</span><span id="project-title" class="hidden"></span></h3>
            <button id="close-left">✕</button>
        </div>
        <!-- Tabs -->
        <div id="left-tabs">
            <button class="tab active" data-tab="project">📁 项目</button>
            <button class="tab" data-tab="files">📂 文件</button>
            <button class="tab tab-project-only" data-tab="git" style="display:none;">🔀 Git</button>
            <button class="tab" data-tab="search">🔍 搜索</button>
            <button class="tab tab-project-only" data-tab="debug" style="display:none;">🔧 环境</button>
        </div>
        <!-- Tab Panels -->
        <div id="left-panels">
            <!-- Project Panel -->
            <div id="panel-project" class="panel active">
                <div class="panel-toolbar">
                    <button id="btn-open-project" title="打开项目">📂 打开项目</button>
                    <button id="btn-clone-project" title="克隆项目">📥 克隆项目</button>
                    <button id="btn-close-project" title="关闭项目" style="display:none;">✕ 关闭项目</button>
                </div>
                <div id="project-info">
                    <div id="project-current" class="project-no-project">
                        <div style="text-align:center;padding:30px 12px;">
                            <div style="font-size:36px;margin-bottom:10px;">📁</div>
                            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:6px;">未打开项目</div>
                            <div style="font-size:11px;color:var(--text-muted);">点击「打开项目」选择一个文件夹，或点击「克隆项目」从远程克隆</div>
                        </div>
                    </div>
                </div>
                <!-- Project folder picker dialog content -->
                <div id="project-folder-picker" class="hidden">
                    <div id="project-picker-header">
                        <button id="project-picker-back" title="返回上级" style="display:none;">⬆</button>
                        <span id="project-picker-path" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">/</span>
                    </div>
                    <div id="project-picker-list"></div>
                </div>
            </div>
            <!-- Files Panel -->
            <div id="panel-files" class="panel">
                <div class="panel-toolbar">
                    <button id="btn-open-folder" title="打开文件夹">📂</button>
                    <button id="btn-new-file" title="新建文件">➕ 文件</button>
                    <button id="btn-new-folder" title="新建文件夹">➕ 文件夹</button>
                    <input type="text" id="workspace-path" placeholder="工作区路径" readonly>
                </div>
                <div id="file-tree"></div>
            </div>
            <!-- Git Panel -->
            <div id="panel-git" class="panel">
                <div class="panel-toolbar">
                    <button id="git-pull" title="拉取">⬇ 拉取</button>
                    <button id="git-push" title="推送">⬆ 推送</button>
                    <button id="git-diff-all-btn" title="查看所有差异">🔎 差异</button>
                    <button id="git-token-btn" title="配置 Token">🔑</button>
                    <button id="git-refresh" title="刷新 Git 状态">🔄 刷新</button>
                </div>
                <div id="git-branch-info">
                    <span id="git-current-branch">-</span>
                    <span id="git-status-count"></span>
                </div>
                <div id="git-changes-list"></div>
                <div id="git-commit-area">
                    <textarea id="git-commit-msg" placeholder="提交信息..." rows="2"></textarea>
                    <button id="git-commit-btn">提交</button>
                </div>
                <div id="git-log-list"></div>
            </div>
            <!-- Search Panel -->
            <div id="panel-search" class="panel">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索...">
                    <button id="search-btn">搜索</button>
                </div>
                <div class="search-options">
                    <label><input type="checkbox" id="search-case"> 区分大小写</label>
                    <label><input type="checkbox" id="search-regex"> 正则</label>
                    <input type="text" id="search-file-pattern" placeholder="文件过滤 (*.py)">
                </div>
                <div id="search-results"></div>
            </div>
            <!-- Debug Panel -->
            <div id="panel-debug" class="panel">
                <div class="panel-toolbar">
                    <select id="compiler-select">
                        <option value="python3">Python 3</option>
                    </select>
                    <button id="venv-btn" title="虚拟环境">🔧</button>
                </div>
                <div id="debug-config">
                    <div id="venv-info">
                        <span>虚拟环境: </span><span id="current-venv">未设置</span>
                    </div>
                    <button id="create-venv-btn">创建虚拟环境</button>
                    <button id="install-pkg-btn">安装包</button>
                    <button id="import-req-btn">📥 导入</button>
                </div>
                <div id="debug-breakpoints"></div>
                <div id="venv-packages" style="display:none;">
                    <div id="venv-progress-area" style="display:none;padding:8px 12px;border-top:1px solid var(--border);">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                            <span id="venv-progress-text" style="font-size:11px;color:var(--text-secondary);">正在安装...</span>
                            <span id="venv-progress-count" style="font-size:10px;color:var(--text-muted);">0/0</span>
                        </div>
                        <div style="height:4px;background:var(--bg-tertiary);border-radius:2px;overflow:hidden;">
                            <div id="venv-progress-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width 0.3s ease;"></div>
                        </div>
                        <div id="venv-current-pkg" style="font-size:10px;color:var(--green);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-mono);"></div>
                    </div>
                    <div style="padding:4px 12px 8px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);">已安装包:</div>
                    <div id="venv-pkg-list" style="flex:1;overflow-y:auto;padding:0 4px;font-size:11px;font-family:var(--font-mono);"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Editor Tabs Bar -->
    <div id="editor-tabs" class="editor-tabs-bar"></div>

    <!-- Main Editor Area -->
    <main id="main-area">
        <div id="editor-toolbar">
            <input type="text" id="editor-search" placeholder="查找..." style="display:none">
            <input type="text" id="editor-replace" placeholder="替换..." style="display:none">
            <button id="editor-search-btn" title="查找">🔍</button>
            <button id="editor-search-go-btn" title="搜索" style="display:none">↵</button>
            <span id="editor-search-count" style="display:none;font-size:11px;color:var(--text-secondary);padding:0 4px;white-space:nowrap;align-self:center;line-height:1;"></span>
            <button id="editor-search-prev-btn" title="上一个" style="display:none">▲</button>
            <button id="editor-search-next-btn" title="下一个" style="display:none">▼</button>
            <button id="editor-search-close-btn" title="关闭查找" style="display:none">✕</button>
            <button id="editor-goto-line-btn" title="跳转到行">⤒</button>
            <button id="btn-md-toggle" title="切换预览" style="display:none">📖</button>
        </div>
        <div id="editor-container">
            <div id="markdown-preview" class="hidden" style="display:none;"></div>
            <textarea id="code-editor"></textarea>
        </div>
        <!-- Bottom Panel (Debug Tools) -->
        <div id="bottom-panel" class="hidden">
            <div id="bottom-panel-header">
                <div id="bottom-tabs">
                    <button class="btab active" data-btab="output">🖥 输出</button>
                    <button class="btab" data-btab="console">📋 控制台</button>
                    <button class="btab" data-btab="network">🌐 网络</button>
                    <button class="btab" data-btab="errors">⚠ 错误</button>
                    <button class="btab" data-btab="debug">🐛 调试</button>
                    <button class="btab" data-btab="procs">⚙ 进程</button>
                    <button class="btab" data-btab="browser">🔍 预览</button>
                </div>
                <button id="bottom-panel-close">✕</button>
                <button id="bottom-panel-clear">🗑</button>
            </div>
            <div id="bottom-panels">
                <!-- Output (original terminal output) -->
                <div id="bpanel-output" class="bpanel active">
                    <div id="output-content"></div>
                    <div id="shell-input-bar">
                        <span id="shell-prompt">$</span>
                        <input type="text" id="shell-input" placeholder="输入命令..." autocomplete="off" spellcheck="false" enterkeyhint="send" inputmode="text">
                        <button id="shell-send-btn" type="button" style="padding:6px 14px;border:none;background:var(--accent);color:#fff;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;">&#9166;</button>
                    </div>
                </div>
                <!-- Console -->
                <div id="bpanel-console" class="bpanel">
                    <div id="debug-console-content"></div>
                </div>
                <!-- Network -->
                <div id="bpanel-network" class="bpanel">
                    <div id="debug-network-content" style="flex:1;overflow-y:auto;padding:6px 8px;font-family:var(--font-mono);font-size:11px;"></div>
                </div>
                <!-- Errors -->
                <div id="bpanel-errors" class="bpanel">
                    <div id="debug-errors-content" style="flex:1;overflow-y:auto;padding:6px 8px;font-family:var(--font-mono);font-size:11px;"></div>
                </div>
                <!-- Debugger -->
                <div id="bpanel-debug" class="bpanel" style="flex-direction:column;">
                    <!-- Debug Toolbar -->
                    <div id="debug-toolbar" style="display:flex;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;">
                        <span id="debug-status-text" class="debug-status-idle" style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-sm);flex-shrink:0;">⏸ 就绪</span>
                        <span id="debug-position" style="font-size:10px;color:var(--text-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">&nbsp;</span>
                        <button id="debug-btn-start" title="开始调试" style="padding:3px 8px;border:none;background:var(--green);color:var(--bg-primary);border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;">▶ 开始</button>
                        <button id="debug-btn-stop" title="停止" style="padding:3px 8px;border:none;background:var(--red);color:var(--bg-primary);border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;" disabled>⏹ 停止</button>
                        <button id="debug-btn-continue" title="继续" style="padding:3px 8px;border:none;background:var(--accent);color:var(--bg-primary);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;" disabled>▶ 继续</button>
                        <button id="debug-btn-step-in" title="步进" style="padding:3px 8px;border:none;background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;" disabled>⤓</button>
                        <button id="debug-btn-step-over" title="步过" style="padding:3px 8px;border:none;background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;" disabled>⤏</button>
                        <button id="debug-btn-step-out" title="步出" style="padding:3px 8px;border:none;background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;" disabled>↩</button>
                    </div>
                    <!-- Debug Content: two-column layout -->
                    <div id="debug-content" style="display:flex;flex:1;overflow:hidden;min-height:0;">
                        <!-- Left column: variables + call stack -->
                        <div id="debug-left-col" style="width:50%;display:flex;flex-direction:column;border-right:1px solid var(--border);">
                            <!-- Variables -->
                            <div style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
                                <div style="padding:3px 8px;font-size:10px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);flex-shrink:0;">局部变量</div>
                                <div id="debug-variables" style="flex:1;overflow-y:auto;padding:2px 0;font-family:var(--font-mono);font-size:11px;"></div>
                            </div>
                            <!-- Call Stack -->
                            <div style="display:flex;flex-direction:column;height:120px;border-top:1px solid var(--border);">
                                <div style="padding:3px 8px;font-size:10px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);flex-shrink:0;">调用栈</div>
                                <div id="debug-callstack" style="flex:1;overflow-y:auto;padding:2px 0;font-family:var(--font-mono);font-size:11px;"></div>
                            </div>
                        </div>
                        <!-- Right column: breakpoints + output + AI log -->
                        <div id="debug-right-col" style="width:50%;display:flex;flex-direction:column;">
                            <!-- Breakpoints -->
                            <div style="display:flex;flex-direction:column;height:80px;border-bottom:1px solid var(--border);">
                                <div style="padding:3px 8px;font-size:10px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);flex-shrink:0;">断点</div>
                                <div id="debug-breakpoint-list" style="flex:1;overflow-y:auto;padding:2px 0;font-family:var(--font-mono);font-size:11px;"></div>
                            </div>
                            <!-- Output -->
                            <div style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
                                <div style="padding:3px 8px;font-size:10px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);flex-shrink:0;">输出</div>
                                <div id="debug-output" style="flex:1;overflow-y:auto;padding:4px 8px;font-family:var(--font-mono);font-size:11px;white-space:pre-wrap;word-break:break-all;"></div>
                            </div>
                            <!-- AI Debug Activity Log -->
                            <div style="display:flex;flex-direction:column;height:100px;border-top:1px solid var(--border);">
                                <div style="padding:3px 8px;font-size:10px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);flex-shrink:0;">AI 调试活动</div>
                                <div id="debug-ai-log" style="flex:1;overflow-y:auto;padding:2px 0;font-size:11px;"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Evaluate input bar -->
                    <div id="debug-eval-bar" style="display:flex;align-items:center;gap:4px;padding:4px 8px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg-tertiary);">
                        <span style="color:var(--green);font-family:var(--font-mono);font-size:12px;font-weight:bold;flex-shrink:0;">&gt;&gt;&gt;</span>
                        <input type="text" id="debug-eval-input" placeholder="输入表达式求值... (暂停时可用)" style="flex:1;padding:4px 8px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-primary);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-mono);outline:none;">
                        <button id="debug-eval-btn" style="padding:4px 10px;border:none;background:var(--accent);color:var(--bg-primary);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;">求值</button>
                    </div>
                </div>
                <!-- Process Manager -->
                <div id="bpanel-procs" class="bpanel" style="flex-direction:column;overflow:hidden;">
                    <table id="process-table" style="width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px;">
                        <thead>
                            <tr style="border-bottom:1px solid var(--border);">
                                <th style="padding:4px 8px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;">ID</th>
                                <th style="padding:4px 8px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;">状态</th>
                                <th style="padding:4px 8px;text-align:left;color:var(--text-muted);font-size:10px;font-weight:600;">运行时间</th>
                                <th style="padding:4px 8px;text-align:right;color:var(--text-muted);font-size:10px;font-weight:600;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="process-list">
                            <tr><td colspan="4" style="color:var(--text-muted);text-align:center;padding:20px;">无运行中的进程</td></tr>
                        </tbody>
                    </table>
                </div>
                <!-- Browser Preview -->
                <div id="bpanel-browser" class="bpanel" style="flex-direction:column;overflow:hidden;">
                    <div id="browser-toolbar" style="display:flex;gap:4px;padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;flex-wrap:nowrap;">
                        <input type="text" id="browser-url-input" placeholder="输入任意网址..." style="flex:1;min-width:0;padding:5px 8px;border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);border-radius:var(--radius-sm);font-size:12px;font-family:var(--font-mono);">
                        <button id="browser-go-btn" title="在预览中打开" style="padding:5px 10px;border:1px solid var(--border);background:var(--accent);color:var(--bg-primary);border-radius:var(--radius-sm);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;">GO</button>
                        <button id="browser-external-btn" title="在外部浏览器中打开" style="padding:5px 8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;white-space:nowrap;">🌐</button>
                        <button id="browser-refresh-btn" title="刷新" style="padding:5px 8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;">↻</button>
                        <button id="browser-inject-btn" title="注入 Bridge" style="padding:5px 8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:11px;cursor:pointer;white-space:nowrap;">💉</button>
                        <button id="browser-logs-btn" title="iframe 控制台日志" style="padding:5px 8px;border:1px solid var(--border);background:var(--bg-surface);color:var(--text-primary);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;">📋 日志</button>
                    </div>
                    <iframe id="preview-frame" style="flex:1;border:none;background:#fff;width:100%;"></iframe>
                    <div id="iframe-logs-panel" style="display:none;height:120px;border-top:1px solid var(--border);background:var(--bg-tertiary);flex-shrink:0;">
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:2px 8px;border-bottom:1px solid var(--border);">
                            <span style="font-size:10px;color:var(--text-muted);">iframe 控制台</span>
                            <button id="iframe-logs-clear" style="padding:1px 6px;border:none;background:none;color:var(--text-muted);font-size:10px;cursor:pointer;">清空</button>
                        </div>
                        <div id="iframe-logs" style="height:calc(100% - 22px);overflow-y:auto;padding:0;"></div>
                    </div>
                </div>
            </div>
            <div id="bottom-panel-resize"></div>
        </div>
    </main>

    <!-- Right Sidebar (Chat) -->
    <div id="sidebar-right" class="sidebar right">
        <div id="sidebar-right-header">
            <h3>🤖 AI 助手</h3>
            <div>
                <button id="chat-new-chat" title="新建对话">📝</button>
                <button id="chat-settings-btn" title="LLM设置">⚙️</button>
                <button id="chat-history-btn" title="历史会话">📋</button>
                <button id="close-right">✕</button>
            </div>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <div id="chat-execute-status"></div>
            <textarea id="chat-input" placeholder="输入消息... (Enter发送)" rows="2"></textarea>
            <div class="chat-send-row">
                <select id="chat-model-select" title="选择模型"></select>
                <button id="chat-send">发送</button>
            </div>
        </div>
    </div>

    <!-- Server Management Bar: removed (Android native bar provides this) -->

    <!-- Update Dialog -->
    <div id="update-dialog-overlay" class="hidden">
        <div id="update-dialog">
            <div id="update-dialog-title">⬆ Updates</div>
            <div id="update-dialog-body">
                <div id="update-current-version"></div>
                <div id="update-status"></div>
                <div id="update-info" class="hidden"></div>
                <div id="update-token-section">
                    <label for="update-github-token">GitHub Token (仅私有仓库需要):</label>
                    <div style="display:flex;gap:6px;margin-top:4px;">
                        <input type="password" id="update-github-token" placeholder="公开仓库无需填写" style="flex:1;padding:6px 8px;border-radius:6px;border:1px solid #555;background:#2a2a2a;color:#ddd;font-size:13px;">
                        <button id="update-save-token" class="btn-secondary" style="padding:6px 12px;font-size:12px;white-space:nowrap;">保存</button>
                    </div>
                </div>
            </div>
            <div id="update-dialog-actions">
                <button id="update-check-btn" class="btn-secondary">检查更新</button>
                <button id="update-diagnose-btn" class="btn-secondary">🔧 诊断</button>
                <button id="update-apply-btn" class="btn-primary hidden">立即更新</button>
                <button id="update-close-btn" class="btn-secondary">关闭</button>
